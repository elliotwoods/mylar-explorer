<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swinging Mylar Simulation</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="title"><i class="fa-solid fa-film"></i> Swinging Mylar Explorer</div>
        <div class="statusBlock">
          <div class="stats">
            <span id="fpsLabel">FPS: --</span>
            <span id="stepLabel">Sim: -- Hz</span>
          </div>
          <div class="simButtons">
            <button id="btnPause"><i class="fa-solid fa-pause"></i> Pause</button>
            <button id="btnReset"><i class="fa-solid fa-rotate-left"></i> Reset</button>
            <button id="btnStep"><i class="fa-solid fa-forward-step"></i> Step</button>
            <button id="btnHalf"><i class="fa-solid fa-backward"></i> ÷2</button>
            <button id="btn1x"><i class="fa-solid fa-gauge-high"></i> 1x</button>
            <button id="btnDouble"><i class="fa-solid fa-forward"></i> ×2</button>
          </div>
        </div>
      </header>
      <div id="toolbar" class="toolbar"></div>
      <div id="widgetsHost">
        <div id="widgetsLeft" class="widgets-column"></div>
        <div id="widgetsRight" class="widgets-column"></div>
      </div>
      <main id="layout" class="split">
        <section class="panel panel-2d">
          <canvas id="view2d"></canvas>
        </section>
        <section class="panel panel-3d">
          <canvas id="view3d"></canvas>
        </section>
      </main>
      <section id="graphsPanel" class="graphs">
        <canvas id="plotsCanvas"></canvas>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
